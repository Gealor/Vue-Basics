<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Vue Basics</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
        <script src="https://unpkg.com/vue@3"></script>
    </head>
    <body>
        <!-- Data Flow работает только от родителя к ребенку, т.е. родительский компонент может передавать данные в дочерний компонент, но не наоборот.
        Если нам нужно передать данные от ребенка к родителю, то мы должны использовать события. Дочерний компонент может вызвать событие, которое будет слушаться родительским компонентом, и при этом может передать данные в это событие. 
        Родительский компонент может обработать это событие и получить данные, которые были переданы из дочернего компонента. -->
        <!-- Пропы (Props) для данных, события (Events) для действий. -->
        <navbar
            :pages="pages"
            :activePage="activePage"
            :nav-link-click="(index) => activePage = index"
        ></navbar>

        <page-viewer 
            :page="pages[activePage]"
        ></page-viewer>

        <script>
            function changeTheme() {
                let theme = 'light';

                if (this.theme === 'light') {
                    theme = 'dark';
                }
                this.theme = theme;
            }
            let app = Vue.createApp({
                // Лучше использовать computed, если нам нужно вычислить какое-то значение на основе других данных, и это значение будет кэшироваться до тех пор, пока эти данные не изменятся. При обращении к navBarClasses будет вызываться каждый раз этот класс и если useDarkNavBar поменяется, то navBarClasses вызовет этот класс и получит новые значения -->
                computed: {
                    navBarClasses() {
                        return {
                            'navbar-dark bg-dark': this.useDarkNavBar,
                            'navbar-light bg-light': !this.useDarkNavBar
                        }
                    }
                },
                data() {
                    return {
                        activePage: 0,
                        useDarkNavBar: true,
                        pages: [
                            {
                                link: {text: "Home", url: "index.html"},
                                pageTitle: "Home Page",
                                content: "Welcome to the Home Page!",
                            },
                            {
                                link: {text: "About", url: "about.html"},
                                pageTitle: "About Page",
                                content: "Welcome to the About Page!",
                            },
                            {
                                link: {text: "Contact", url: "contact.html"},
                                pageTitle: "Contact Page",
                                content: "Welcome to the Contact Page!",
                            }
                        ],
                    }
                },
            })
            // Здесь мы создаем глобальный компонент page-viewer, который будет отображать контент страницы. Этот компонент можно использовать в любом месте нашего приложения.
            // Проблема в том, что мы не можем напрямую обратиться к данным родительского компонента, дочерний о них попросту не знает. Для решения этой проблемы нам нужно передать эти данные через props, т.е. мы должны явно указать, какие данные мы хотим передать в компонент и как они будут называться внутри компонента. 
            // При этом camelCase в props не работает, т.е. если мы передаем pageTitle, то внутри компонента мы должны использовать page-title, а не pageTitle.
            app.component('page-viewer', {
                props: ['page'],
                template: `
                <div id='content' class="container">
                    <h1>{{ page.pageTitle }}</h1>
                    <p>{{ page.content }}</p>
                </div>
                `
            });

            app.component('navbar', {
                // Мы не можем менять значения props внутри компонента, они только readOnly.
                props: ["activePage", "pages", "navLinkClick"],
                template: `
                <nav
                    id='navigationMenuUp' 
                    :class="[\`navbar-\${theme}\`, \`bg-\${theme}\`, 'navbar', 'navbar-expand-lg']"
                >
                    <div class="container-fluid">
                        <a class="navbar-brand" href="#">My Vue</a>
                        <div class="collapse navbar-collapse" id="navbarSupportedContent">
                            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                                <li v-for="(page, index) in pages" class="nav-item" :key="index"> 
                                    <a 
                                        class="nav-link"
                                        :class="{active: activePage == index}" 
                                        aria-current="page" 
                                        :href="page.link.url"
                                        :title="\`This link goes to the \${page.link.text} page\`"
                                        @click.prevent="navLinkClick(index)",
                                    >{{ page.link.text }}</a>
                                </li>
                            </ul>
                        </div>

                        <form class="d-flex">
                            <button 
                                class="btn btn-primary"
                                @click.prevent="changeTheme()"
                            ></button>
                        </form>

                    </div>
                </nav>
                `,

                data() {
                    return {
                        theme: 'dark',
                    }
                },

                methods: {
                    changeTheme() {
                        let theme = 'light';

                        if (this.theme === 'light') {
                            theme = 'dark';
                        }
                        this.theme = theme;
                    }
                }
            }); 

            app.mount('body');
        </script>
    </body>
</html>
