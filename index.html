<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Vue Basics</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
        <script src="https://unpkg.com/vue@3"></script>
    </head>
    <body>
        <!-- Здесь в класс добавляем классы для темной и светлой темы, а в атрибут class добавляем синтаксис v-bind:class или просто :class и передаем объект, в котором ключ - это класс, который мы хотим добавить, а значение - это условие, при котором этот класс будет добавляться
        и так мы можем динамически менять классы в зависимости от условий. -->
        <nav 
            id='navigationMenuUp' 
            :class="[`navbar-${theme}`, `bg-${theme}`, 'navbar', 'navbar-expand-lg']"
        >
            <div class="container-fluid">
                <a class="navbar-brand" href="#">My Vue</a>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <!-- Синтаксис v-for для перебора массива и отображения каждого элемента, его нужно навешивать именно на компонент, который нужно повторить. -->
                        <li v-for="(page, index) in pages" class="nav-item" :key="index"> 
                            <!-- Для передачи данных в тег, нужно использовать v-bind: либо просто : перед нужным параметром и без всяких двойных фигурных скобок передавать объект или действие -->
                            <!-- Если же мы форматируем строку внутри тега, то нужно использовать также синтаксис v-bind либо просто : перед параметром и внутри ${...} подставлять значение, 
                            перед этим нужно обернуть форматируемую строку в ``, т.е. так "'Some string ${some_attribute}'"-->
                            <!-- Если надо внедрить в тег какое-то действие, то нужно использовать синтаксис v-on: либо просто @ перед нужным событием и без всяких двойных фигурных скобок передавать объект или действие
                            если же добавить постфикс .prevent, то это отменяет стандартное поведение при клике, т.е. в данном случае не будет происходить href -->
                            <!-- :class="{active: activePage == index}" здесь мы динамически добавляем класс active, если индекс страницы совпадает с индексом активной страницы -->
                            <a 
                                class="nav-link"
                                :class="{active: activePage == index}" 
                                aria-current="page" 
                                :href="page.link.url"
                                :title="`This link goes to the ${page.link.text} page`"
                                @click.prevent="activePage = index",
                            >{{ page.link.text }}</a>
                        </li>
                    </ul>
                </div>

                <form class="d-flex">
                    <button 
                        class="btn btn-primary"
                        @click.prevent="changeTheme()"
                    ></button>
                </form>

            </div>
        </nav>

        <page-viewer 
            :page="pages[activePage]"
        ></page-viewer>

        <script>
            function changeTheme() {
                let theme = 'light';

                if (this.theme === 'light') {
                    theme = 'dark';
                }
                this.theme = theme;
            }
            let app = Vue.createApp({
                // Лучше использовать computed, если нам нужно вычислить какое-то значение на основе других данных, и это значение будет кэшироваться до тех пор, пока эти данные не изменятся. При обращении к navBarClasses будет вызываться каждый раз этот класс и если useDarkNavBar поменяется, то navBarClasses вызовет этот класс и получит новые значения -->
                computed: {
                    navBarClasses() {
                        return {
                            'navbar-dark bg-dark': this.useDarkNavBar,
                            'navbar-light bg-light': !this.useDarkNavBar
                        }
                    }
                },
                data() {
                    return {
                        activePage: 0,
                        useDarkNavBar: true,
                        theme: 'dark',
                        pages: [
                            {
                                link: {text: "Home", url: "index.html"},
                                pageTitle: "Home Page",
                                content: "Welcome to the Home Page!",
                            },
                            {
                                link: {text: "About", url: "about.html"},
                                pageTitle: "About Page",
                                content: "Welcome to the About Page!",
                            },
                            {
                                link: {text: "Contact", url: "contact.html"},
                                pageTitle: "Contact Page",
                                content: "Welcome to the Contact Page!",
                            }
                        ],
                    }
                },
                methods: {
                    changeTheme() {
                        let theme = 'light';

                        if (this.theme === 'light') {
                            theme = 'dark';
                        }
                        this.theme = theme;
                    }
                }
            })
            // Здесь мы создаем глобальный компонент page-viewer, который будет отображать контент страницы. Этот компонент можно использовать в любом месте нашего приложения.
            // Проблема в том, что мы не можем напрямую обратиться к данным родительского компонента, дочерний о них попросту не знает. Для решения этой проблемы нам нужно передать эти данные через props, т.е. мы должны явно указать, какие данные мы хотим передать в компонент и как они будут называться внутри компонента. 
            // При этом camelCase в props не работает, т.е. если мы передаем pageTitle, то внутри компонента мы должны использовать page-title, а не pageTitle.
            app.component('page-viewer', {
                props: ['page'],
                template: `
                <div id='content' class="container">
                    <h1>{{ page.pageTitle }}</h1>
                    <p>{{ page.content }}</p>
                </div>
                `
            });

            app.mount('body');

            app.component('navbar', {
                template: 
            })

        </script>
    </body>
</html>
